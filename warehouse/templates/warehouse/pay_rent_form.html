{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Pay Rent Form{% endblock %}

{% block content %}
<div class="container mt-2">
    <div class="row d-flex justify-content-center">
        <div class="col-sm-8 shadow-lg">
            <form action="" method="post">
                {% csrf_token %}
                <div class="row m-5">
                    <div class="col">
                        <h3>{% if not update %}  Pay Rent for {{store}} {% else %} Update Rent Renewal {% endif %}</h3>
                        {{form|crispy}}
                    </div>
                </div>
                <div class="col mb-4">
                    <input class="btn btn-primary" type="submit" value="Submit">
                    
                    <a class="btn btn-secondary float-right" href="{% url 'warehouse-home' %}">
                        <i class="fa fa-times-circle"></i>
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
