{% extends 'core/base.html' %}

{% block page_title %}Stock Balancing{% endblock %}

{% block head %}
<style>
  .ds-card__body table.table-bordered th,
  .ds-card__body table.table-bordered td {
    padding: 0.6rem 0.85rem;
  }

  .ds-frag-loading {
    padding: 1.75rem;
    text-align: center;
    color: var(--color-text-muted, #6c757d);
  }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">

  <div class="ds-card mb-4">
    <div class="ds-card__header d-flex justify-content-between align-items-center">
      <span><i class="fa fa-balance-scale mr-2"></i>Stock Balancing</span>
      <a class="staff-nav-link" href="{% url 'product-home' %}">
        <i class="fa fa-times-circle"></i> Return
      </a>
    </div>
  </div>

  <!-- ── Balancing tables (lazy) ──────────────────────── -->
  <div hx-get="{% url 'stock-balancing-tables' %}" hx-trigger="load" hx-swap="outerHTML">
    <div class="ds-card mb-4"><div class="ds-frag-loading">
      <i class="fa fa-spinner fa-spin mr-2"></i>Evaluating stock levels across all products…
    </div></div>
  </div>

</div>
{% endblock %}
