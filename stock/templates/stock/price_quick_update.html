{% extends 'core/base.html' %}
{% load l10n %}

{% block page_title %}Price Update{% endblock %}

{% block content %}
<div class="container-fluid">

  <!-- ── Nav card ───────────────────────────────────── -->
  <div class="ds-card mb-4">
    <div class="ds-card__header d-flex justify-content-between align-items-center flex-wrap">
      <span><i class="fa fa-tag mr-2"></i>Price Update</span>
      <div class="d-flex align-items-center staff-nav-bar">
        <a class="staff-nav-link" href="{% url 'product-home' %}">
          <i class="fa fa-times-circle"></i> Return
        </a>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="ds-card">
        <div class="ds-card__header"><span><i class="fa fa-money mr-2"></i>Adjust Selling Price</span></div>
        <div class="ds-card__body">
          <form method="POST" action="{% url 'price-quick-update' %}">
            {% csrf_token %}

            <div class="form-group">
              <label for="productSelect">Product</label>
              <select id="productSelect" name="product" class="form-control" required>
                <option value="" disabled selected>Select a product</option>
                {% for product in products %}
                <option value="{{ product.pk }}" data-price="{{ product.unit_price.amount|unlocalize }}">{{ product }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label>Current Selling Price</label>
              <input type="text" id="currentPrice" class="form-control" value="-" readonly>
            </div>

            <div class="form-row">
              <div class="form-group col-sm-4">
                <label for="direction">Action</label>
                <select id="direction" name="direction" class="form-control">
                  <option value="increase">Increase by</option>
                  <option value="decrease">Decrease by</option>
                </select>
              </div>
              <div class="form-group col-sm-4">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" class="form-control" min="0" step="0.01" required>
              </div>
              <div class="form-group col-sm-4">
                <label>New Selling Price</label>
                <input type="text" id="newPrice" class="form-control" value="-" readonly>
              </div>
            </div>

            <div class="form-actions d-flex justify-content-end" style="border-top: 1px solid var(--color-border); margin-top: 1rem; padding-top: 1.25rem;">
              <button type="submit" class="btn btn-primary">
                <i class="fa fa-save mr-1"></i> Update Price
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  (function () {
    var productSelect = document.getElementById('productSelect');
    var currentPriceInput = document.getElementById('currentPrice');
    var newPriceInput = document.getElementById('newPrice');
    var directionSelect = document.getElementById('direction');
    var amountInput = document.getElementById('amount');

    function updatePreview() {
      var option = productSelect.options[productSelect.selectedIndex];
      var current = parseFloat(option.getAttribute('data-price'));
      if (isNaN(current)) {
        currentPriceInput.value = '-';
        newPriceInput.value = '-';
        return;
      }
      currentPriceInput.value = current.toFixed(2);

      var amount = parseFloat(amountInput.value);
      if (isNaN(amount)) {
        newPriceInput.value = '-';
        return;
      }
      var newPrice = directionSelect.value === 'decrease' ? current - amount : current + amount;
      newPriceInput.value = newPrice.toFixed(2);
    }

    productSelect.addEventListener('change', updatePreview);
    directionSelect.addEventListener('change', updatePreview);
    amountInput.addEventListener('input', updatePreview);
  })();
</script>
{% endblock %}
