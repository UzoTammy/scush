{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{% if object %}Update{% else %}Create{% endif %} Budget Year{% endblock %}

{% block content %}
<div class="container">
  <div class="ds-card mt-4">
    <div class="ds-card__header">
      <i class="fa fa-calendar mr-2"></i>{% if object %}Update{% else %}Create{% endif %} Budget Year
    </div>
    <div class="ds-card__body">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-3">
          <button type="submit" class="btn btn-primary">Save</button>
          <a class="btn btn-secondary float-right" href="{% url 'budget-year-list' %}">
            <i class="fa fa-times-circle"></i> Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
