{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Settings Form{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col">
            <h3>Json Data Collection</h3>
            <form action="" method="post">
                {% csrf_token %}
                {{form|crispy}}
                <div class="row">
                    <div class="col text-right">
                        <button class="btn btn-primary" type="submit">Submit</button>
                        <a class="btn btn-secondary" href="{% url 'json-list' %}"> <i class="fa fa-home"></i> Settings</a>
                    </div>
                </div>
                
            </form>
        </div>
    </div>
</div>
{% endblock %}
