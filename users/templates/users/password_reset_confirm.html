{% extends 'users/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}New Password{% endblock %}

{% block content %}
<h2 class="auth-card__title">Set New Password</h2>
<form method="POST">
  {% csrf_token %}
  <div class="form-group">
    {{ form|crispy }}
  </div>
  <button class="btn btn-primary w-100" type="submit">Save New Password</button>
</form>
{% endblock %}
