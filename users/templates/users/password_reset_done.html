{% extends 'users/base.html' %}

{% block page_title %}Email Sent{% endblock %}

{% block content %}
<h2 class="auth-card__title">Check Your Email</h2>
<div class="alert alert-success text-center">
  <i class="fa fa-envelope fa-2x mb-2"></i><br>
  A password reset link has been sent to your inbox.
</div>
<div class="text-center mt-3">
  <a href="{% url 'login' %}" class="btn btn-secondary btn-sm">
    <i class="fa fa-arrow-left mr-1"></i> Back to Sign In
  </a>
</div>
{% endblock %}
