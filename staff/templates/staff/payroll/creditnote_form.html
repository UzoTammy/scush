{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}New Credit Note{% endblock %}

{% block content %}
<div class="container-fluid">

  <!-- ── Nav strip ──────────────────────────────────── -->
  <div class="ds-card mb-4">
    <div class="ds-card__header d-flex justify-content-between align-items-center">
      <span><i class="fa fa-plus-circle mr-2"></i>New Credit Note</span>
      {% if switch == 2 %}
      <a class="staff-nav-link" href="{{ payroll_url }}">
        <i class="fa fa-times-circle"></i> Cancel
      </a>
      {% else %}
      <a class="staff-nav-link" href="{% url 'salary' %}">
        <i class="fa fa-times-circle"></i> Cancel
      </a>
      {% endif %}
    </div>
  </div>

  <!-- ── Form ───────────────────────────────────────── -->
  <div class="ds-card ds-card--narrow mx-auto">
    <div class="ds-card__body">
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="d-flex justify-content-between mt-3">
          <div>
            <button type="submit" name="action" value="1" class="btn btn-secondary mr-2">
              <i class="fa fa-plus mr-1"></i> Save &amp; New
            </button>
            <button type="submit" name="action" value="2" class="btn btn-primary">
              <i class="fa fa-save mr-1"></i> Save
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
