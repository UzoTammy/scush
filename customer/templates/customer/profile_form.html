{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Profile Form{% endblock %}

{% block content %}
<div class="container">
    <div class="row p-3 d-flex justify-content-center">
        <div class="col-sm-8 shadow">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <legend class="text-warning">{{ title }} Customer Data</legend>
                <fieldset class="bg-light">
                    <div class="ml-2">{{ form|crispy }}</div>
                </fieldset>
                <div class="form-group p-2">
                    <button class="btn btn-outline-warning" type="submit">Submit</button>
                    {% if title == "Update" %}
                    <a class="btn btn-outline-light float-right"
                       href="{% url 'customer-detail' object.pk %}">
                        <i class="fa fa-times-circle"></i> Return</a>
                    {% else %}
                    <a class="btn btn-outline-light float-right"
                       href="{% url 'customer-home' %}">
                        <i class="fa fa-times-circle"></i> Return</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
