{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}Task Form{% endblock %}

{% block content %}
<div class="container">
<form action="" method="post">
    {% csrf_token %}
    <legend>{% if object %}Update Task{% else %}New Task{% if project %} — {{ project.name }}{% endif %}{% endif %}</legend>
    <fieldset>
    <div class="row mt-3">
        <div class="col">
            {{form|crispy}}
        </div>
    </div>
    </fieldset>
    <div class="row mt-3 mb-3">
        <div class="col">
            <button type="submit"
            class="btn btn-primary">Submit</button>
            <a class="btn btn-secondary float-right"
            href="{% if object %}{{ object.get_absolute_url }}{% elif project %}{% url 'comms-project-detail' project.pk %}{% else %}{% url 'comms-task-list' %}{% endif %}">
                <i class="fa fa-times-circle"></i>
            </a>
        </div>
    </div>
</form>
</div>
{% endblock content %}
